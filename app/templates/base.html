<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %} Politics: Visualised {% endblock %}</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Erica+One&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- My CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="min-vh-100 d-flex flex-column">
    <header class="sticky-top bg-white border-bottom shadow-sm">
      <div class="container-xl p-3">
        <div class="d-flex flex-column align-items-center">
          <h1 class="text-center mb-3">
            <span class="T-N-R-I">Politics: </span>
            <span class="erica-one-regular diagonal-gradient">Visualised</span>
          </h1>

          <nav class="w-100">
            <ul class="nav justify-content-center border-top pt-2">
              <li class="nav-item dropdown">
                <button
                  class="btn dropdown-toggle"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Petitions
                </button>
                <ul class="dropdown-menu shadow">
                  <li>
                    <a
                      class="dropdown-item"
                      href="{{url_for('petitions.upload')}}"
                      >Upload a new file</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="#"
                      >View previously saved petitions</a
                    >
                  </li>
                </ul>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main class="container-xl flex-grow-1 p-3 p-md-4">
      {% block content %} {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %} {% endblock %}
  </body>
</html>
