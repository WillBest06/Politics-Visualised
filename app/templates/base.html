<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %} Politics: Visualised {% endblock %}</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Erica+One&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="min-vh-100 d-flex flex-column align-items-center">
    <header class="p-3 w-75 sticky-top bg-white">
      <div
        class="d-flex flex-column flex-wrap align-items-center justify-content-center justify-content-lg-start"
      >
        <h1>
          <span class="T-N-R-I">Politics: </span>
          <span class="erica-one-regular diagonal-gradient">Visualised</span>
        </h1>

        <nav class="border-bottom border-top w-100">
          <ul
            class="nav col-12 col-lg-auto mb-2 justify-content-center mb-md-0"
          >
            <li>
              <button
                class="btn dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Petitions
              </button>
              <ul class="dropdown-menu">
                <li>
                  <a
                    class="dropdown-item"
                    href="{{url_for('petitions.upload')}}"
                    >Upload a new file</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href=""
                    >View previously saved petitions</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="p-4 w-75">{% block content %} {% endblock %}</main>

    {% block scripts %} {% endblock %}
  </body>
</html>
