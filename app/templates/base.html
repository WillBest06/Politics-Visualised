<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %} Politics: Visualised {% endblock %}</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Erica+One&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- My CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="min-vh-100 d-flex flex-column bg-light">
    <header class="sticky-top bg-white border-bottom shadow-sm">
      <nav
        class="navbar navbar-expand-lg bg-white border-bottom sticky-top shadow-sm py-3"
      >
        <div class="container-xl">
          <div class="d-flex flex-column w-100">
            <!-- Responsive Mobile layout -->
            <div
              class="d-flex align-items-center justify-content-between w-100"
            >
              <button
                class="navbar-toggler border-0 order-1 d-lg-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Toggle navigation"
              >
                <span class="navbar-toggler-icon"></span>
              </button>

              <a
                class="navbar-brand m-0 order-2 flex-grow-1 text-center"
                href="/"
              >
                <h1 class="nav-title mb-0">
                  <span class="T-N-R-I">Politics: </span>
                  <span class="erica-one-regular diagonal-gradient"
                    >Visualised</span
                  >
                </h1>
              </a>

              <button
                class="btn btn-sm btn-outline-secondary d-lg-none order-3"
              >
                <i class="bi bi-person"></i>
              </button>
            </div>

            <!-- Desktop layout -->
            <div class="collapse navbar-collapse order-4" id="mainNav">
              <ul
                class="navbar-nav mx-auto mt-3 border-top pt-2 pt-lg-0 border-lg-0 w-100 justify-content-center"
              >
                <li class="nav-item">
                  <a class="nav-link px-3" href="/">Home</a>
                </li>
                <li class="nav-item dropdown">
                  <a
                    class="nav-link dropdown-toggle px-3"
                    href="#"
                    role="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    Petitions
                  </a>
                  <ul class="dropdown-menu shadow border-0">
                    <li>
                      <a
                        class="dropdown-item"
                        href="{{url_for('petitions.upload')}}"
                        >Upload File</a
                      >
                    </li>
                    <li>
                      <a class="dropdown-item" href="#">Saved Petitions</a>
                    </li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link px-3" href="{{url_for('members.search')}}"
                    >MPs</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container-xl flex-grow-1 p-3 p-md-4">
      {% block content %} {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %} {% endblock %}
  </body>
</html>
