{% macro members_list(members) %}
<link
  href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css"
  rel="stylesheet"
/>

<div class="container my-4 px-2">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8 px-0">
      <ul class="list-group shadow-sm">
        {% for member in members %}
        <li
          class="list-group-item list-group-item-action p-3 position-relative border-bottom bg-white"
        >
          <div class="d-flex flex-row align-items-center text-start">
            <div class="flex-shrink-0 me-3 me-sm-4">
              <img
                src="{{ member.value.thumbnailUrl }}"
                class="rounded-circle border shadow-sm"
                width="90"
                height="90"
                style="object-fit: cover"
              />
            </div>

            <div class="flex-grow-1 w-100">
              <h3 class="h5 mb-1 fw-bold text-dark">
                {{ member.value.nameDisplayAs }}
              </h3>
              <p class="mb-1 text-muted small">
                <i class="bi bi-people-fill me-1"></i> {{
                member.value.latestParty.name }}
              </p>
              <p class="mb-0 text-muted small">
                <i class="bi bi-geo-alt-fill me-1"></i> {{
                member.value.latestHouseMembership.membershipFrom }}
              </p>
            </div>

            <div class="ms-auto text-primary">
              <i class="bi bi-arrow-right fs-4"></i>
            </div>
          </div>

          <a href="#" class="stretched-link"></a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endmacro %}
